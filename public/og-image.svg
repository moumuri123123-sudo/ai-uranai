<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Neon red glow filter for border -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feGaussianBlur stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gold glow filter for title -->
    <filter id="goldGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle radial gradient for background depth -->
    <radialGradient id="bgGradient" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a0a12"/>
      <stop offset="100%" stop-color="#0a0408"/>
    </radialGradient>
    <!-- Decorative corner ornament gradient -->
    <linearGradient id="ornamentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff2d55" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Outer neon border -->
  <rect x="20" y="20" width="1160" height="590" rx="8" ry="8"
        fill="none" stroke="#ff2d55" stroke-width="2" filter="url(#neonGlow)" opacity="0.7"/>

  <!-- Inner neon border -->
  <rect x="36" y="36" width="1128" height="558" rx="4" ry="4"
        fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.4"/>

  <!-- Corner ornaments - top left -->
  <line x1="20" y1="80" x2="80" y2="20" stroke="url(#ornamentGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="20" cy="20" r="4" fill="#ff2d55" filter="url(#neonGlow)" opacity="0.6"/>

  <!-- Corner ornaments - top right -->
  <line x1="1120" y1="20" x2="1180" y2="80" stroke="url(#ornamentGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="1180" cy="20" r="4" fill="#ff2d55" filter="url(#neonGlow)" opacity="0.6"/>

  <!-- Corner ornaments - bottom left -->
  <line x1="20" y1="550" x2="80" y2="610" stroke="url(#ornamentGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="20" cy="610" r="4" fill="#ff2d55" filter="url(#neonGlow)" opacity="0.6"/>

  <!-- Corner ornaments - bottom right -->
  <line x1="1120" y1="610" x2="1180" y2="550" stroke="url(#ornamentGrad)" stroke-width="1" opacity="0.5"/>
  <circle cx="1180" cy="610" r="4" fill="#ff2d55" filter="url(#neonGlow)" opacity="0.6"/>

  <!-- Decorative horizontal lines -->
  <line x1="200" y1="210" x2="460" y2="210" stroke="#ff2d55" stroke-width="1" opacity="0.3"/>
  <line x1="740" y1="210" x2="1000" y2="210" stroke="#ff2d55" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="430" x2="460" y2="430" stroke="#ff2d55" stroke-width="1" opacity="0.3"/>
  <line x1="740" y1="430" x2="1000" y2="430" stroke="#ff2d55" stroke-width="1" opacity="0.3"/>

  <!-- Small diamond ornaments on horizontal lines -->
  <polygon points="470,210 480,205 490,210 480,215" fill="#ff2d55" opacity="0.4"/>
  <polygon points="710,210 720,205 730,210 720,215" fill="#ff2d55" opacity="0.4"/>
  <polygon points="470,430 480,425 490,430 480,435" fill="#ff2d55" opacity="0.4"/>
  <polygon points="710,430 720,425 730,430 720,435" fill="#ff2d55" opacity="0.4"/>

  <!-- Main title "占処" -->
  <text x="600" y="320" text-anchor="middle" dominant-baseline="central"
        font-family="'Shippori Mincho B1', 'Noto Serif JP', 'Yu Mincho', serif"
        font-size="160" font-weight="700" fill="#ffd700" filter="url(#goldGlow)">
    占処
  </text>

  <!-- Subtitle "AI占い師" -->
  <text x="600" y="420" text-anchor="middle" dominant-baseline="central"
        font-family="'Zen Maru Gothic', 'Noto Sans JP', sans-serif"
        font-size="42" font-weight="400" fill="#f5e6d0" letter-spacing="0.15em" opacity="0.9">
    AI占い師
  </text>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" dominant-baseline="central"
        font-family="'Zen Maru Gothic', 'Noto Sans JP', sans-serif"
        font-size="22" font-weight="300" fill="#f5e6d0" letter-spacing="0.2em" opacity="0.5">
    タロット・星座・相性・MBTI
  </text>

  <!-- Top decorative star/sparkle -->
  <g transform="translate(600, 170)" opacity="0.6">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ffd700" stroke-width="1"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#ffd700" stroke-width="1"/>
  </g>

  <!-- Bottom decorative star/sparkle -->
  <g transform="translate(600, 530)" opacity="0.4">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#ffd700" stroke-width="1"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#ffd700" stroke-width="1"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ffd700" stroke-width="0.8"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#ffd700" stroke-width="0.8"/>
  </g>
</svg>